name: Publish Binary Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "手动指定发布标签 (如: v0.3.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test_gate:
    name: Test Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install BPF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev gcc-multilib
      - name: Run full test suite
        run: make test

  build_binary:
    name: Build binary
    runs-on: ubuntu-latest
    needs: test_gate
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install BPF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev gcc-multilib

      - name: Build
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          go generate ./...
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
          go build -v -trimpath -ldflags "-X main.version=${VERSION}" -o baozap-${{ matrix.arch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: baozap-${{ matrix.arch }}
          retention-days: 1

  release:
    name: Release Assets
    runs-on: ubuntu-latest
    needs: build_binary
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: Resolve tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Package binaries
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          for arch in amd64 arm64; do
            chmod +x "dist/baozap-${arch}"
            mkdir -p "dist/pkg-${arch}"
            cp "dist/baozap-${arch}" "dist/pkg-${arch}/baozap"
            tar -C "dist/pkg-${arch}" -czf "dist/baozap-${TAG}-${arch}.tar.gz" baozap
          done
          (cd dist && sha256sum baozap-"${TAG}"-amd64.tar.gz baozap-"${TAG}"-arm64.tar.gz > sha256sums.txt)

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/baozap-${{ steps.meta.outputs.tag }}-amd64.tar.gz
            dist/baozap-${{ steps.meta.outputs.tag }}-arm64.tar.gz
            dist/sha256sums.txt
