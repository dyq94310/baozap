name: Publish Docker Images 

on:
  push:
    branches: [ "main", "dev" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 阶段 1: 交叉编译 Go 二进制文件
  build_binary:
    name: Build binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { arch: amd64, platform: "linux/amd64" }
          - { arch: arm64, platform: "linux/arm64" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install BPF dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev gcc-multilib

      - name: Build
        run: |
          go generate ./...
          # 使用静态编译，防止 alpine 环境缺少 glibc 依赖
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go build -v -trimpath -o baozap-${{ matrix.arch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: baozap-${{ matrix.arch }}
          retention-days: 1

  # 阶段 2: 为每个架构构建独立的 Docker 镜像并推送 Digest
  build_docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build_binary
    strategy:
      matrix:
        include:
          - { arch: amd64, platform: "linux/amd64" }
          - { arch: arm64, platform: "linux/arm64" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: .

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.binary
          platforms: ${{ matrix.platform }}
          build-args: ARCH=${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*

  # 阶段 3: 合并所有架构的 Digest 并发布最终 Tag
  merge:
    runs-on: ubuntu-latest
    needs: build_docker
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        run: |
          # 动态确定 Tag
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            TAG="latest"
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            TAG="dev"
          else
            TAG="${{ github.ref_name }}"
          fi
          
          docker buildx imagetools create \
                      -t "ghcr.io/dyq94310/baozap:${TAG}" \
                      $(printf 'ghcr.io/dyq94310/baozap@sha256:%s ' *)