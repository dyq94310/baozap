name: Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "手动指定构建标签 (如: v0.1.0)"
        required: false
        type: string

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build_binary:
    name: Build binary
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - { arch: amd64, platform: "linux/amd64" }
          - { arch: arm64, platform: "linux/arm64" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install BPF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev gcc-multilib

      - name: Build
        run: |
          # 执行 eBPF 代码生成
          go generate ./...
          # 静态编译以适配 Alpine 镜像
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
          go build -v -trimpath -o baozap-${{ matrix.arch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: baozap-${{ matrix.arch }}
          retention-days: 1

  build_docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build_binary
    strategy:
      fail-fast: true
      matrix:
        include:
          - { platform: "linux/amd64", arch: amd64 }
          - { platform: "linux/arm64", arch: arm64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v5
        with:
          name: binary-${{ matrix.arch }}
          path: .

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          context: .
          file: Dockerfile.binary
          build-args: ARCH=${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          # 模仿 sing-box: 推送 digest 而非直接打 tag
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge Manifest
    runs-on: ubuntu-latest
    needs: build_docker
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_TAG="${{ inputs.tag }}"
          else
            # 当通过 push tag 触发时，ref_name 就是 tag 的名字 (比如 v0.1.0)
            RAW_TAG="${{ github.ref_name }}"
          fi

          # 2. 剥离开头的 'v' 字符 (v0.1.0 -> 0.1.0)
          VERSION="${RAW_TAG#v}"

          echo "检测到发版请求，准备构建版本: ${VERSION} 和 latest"

          # 3. 极其清爽的打包命令，固定打上版本号和 latest 两个标签
          docker buildx imagetools create \
            -t "${{ env.REGISTRY_IMAGE }}:${VERSION}" \
            -t "${{ env.REGISTRY_IMAGE }}:latest" \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)