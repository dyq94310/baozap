name: Test

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  test:
    name: Go Test + XDP Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install BPF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev gcc-multilib
      - name: Run full test suite
        run: make test
